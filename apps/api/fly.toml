# fly.toml app configuration file generated for quash on 2026-03-22T14:14:14Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'quash'
primary_region = 'ams'

[deploy]
  release_command = "npx prisma db push --schema prisma/schema.prisma --skip-generate"

[build]

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
